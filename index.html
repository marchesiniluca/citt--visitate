<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabellone Viaggi Italia</title>
    <style>
        :root {
            --primary-color: #2f4f4f; --secondary-color: #008b8b; --bg-color: #f4f7f6; --card-bg: #ffffff; --text-color: #333333;
            --p1-color: #3b82f6; --p2-color: #ec4899; --p3-color: #10b981; --p4-color: #f59e0b;
        }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0 0 40px 0; color: var(--text-color); user-select: none; }
        .header-container { text-align: center; padding: 25px 15px; background: linear-gradient(135deg, var(--primary-color), #1a3333); color: white; position: relative; }
        .header-titolo { font-size: 26px; font-weight: 700; margin: 0; }
        #status-indicator { position: absolute; top: 22px; right: 20px; font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 20px; background: rgba(255, 255, 255, 0.15); color: white; }
        .user-controls { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
        #user-badge, #token-reset-btn { font-size: 12px; padding: 4px 12px; border-radius: 12px; cursor: pointer; background: rgba(255,255,255,0.2); border: 1px dashed rgba(255,255,255,0.4); color: white; }
        #token-reset-btn { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.4); }
        .top-sticky-container { position: sticky; top: 0; background-color: rgba(244, 247, 246, 0.95); backdrop-filter: blur(8px); z-index: 1000; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; }
        .stat-box { background: var(--card-bg); padding: 10px; border-radius: 12px; border: 1px solid #eef2f2; text-align: center; cursor: pointer; }
        .stat-box.active-user { box-shadow: 0 0 0 2px var(--text-color); background-color: #f0fdf4; }
        .stat-name { font-weight: 600; font-size: 14px; }
        .stat-score { font-size: 20px; font-weight: 700; }
        .main-content { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .regione-card { background: var(--card-bg); border-radius: 12px; border: 1px solid #eef2f2; margin-bottom: 25px; overflow: hidden; }
        .regione-header { background-color: #f8faf9; font-weight: 700; padding: 14px 20px; display: flex; justify-content: space-between; cursor: pointer; }
        .table-header-row, .citta-row { display: grid; grid-template-columns: 2fr repeat(4, 1fr); padding: 10px 20px; text-align: center; border-bottom: 1px solid #eef2f2; }
        .table-header-row div:first-child, .col-citta { text-align: left; }
        .col-citta { font-weight: 500; font-size: 14px; }
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }
        input[type="checkbox"]:disabled { opacity: 0.4; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-titolo">✈️ Città Visitate d'Italia</div>
        <div id="status-indicator">⏳ Avvio...</div>
        <div class="user-controls">
            <div id="user-badge" onclick="cambiaUtenteAttivo()">👤 Utente: <strong id="current-user-label">Luca</strong></div>
            <div id="token-reset-btn" onclick="resettaToken()">🔑 Cambia Token</div>
        </div>
    </div>

    <div class="top-sticky-container">
        <div class="dashboard">
            <div class="stat-box" id="box-p1" onclick="selezionaUtenteCard('p1')"><div class="stat-name" style="color:var(--p1-color)">Luca</div><div class="stat-score" id="score-p1">0</div></div>
            <div class="stat-box" id="box-p2" onclick="selezionaUtenteCard('p2')"><div class="stat-name" style="color:var(--p2-color)">Elena</div><div class="stat-score" id="score-p2">0</div></div>
            <div class="stat-box" id="box-p3" onclick="selezionaUtenteCard('p3')"><div class="stat-name" style="color:var(--p3-color)">Alessia</div><div class="stat-score" id="score-p3">0</div></div>
            <div class="stat-box" id="box-p4" onclick="selezionaUtenteCard('p4')"><div class="stat-name" style="color:var(--p4-color)">Filippo</div><div class="stat-score" id="score-p4">0</div></div>
        </div>
    </div>

    <div class="main-content" id="regions-container"></div>

    <script>
        const GH_CONFIG = { owner: "marchesiniluca", repo: "citt--visitate", path: "dati.json", branch: "main" };
        let GITHUB_TOKEN = localStorage.getItem('gh_travel_token') || "";
        let UTENTE_ATTIVO = localStorage.getItem('gh_travel_user') || "p1";
        let statoGlobale = {};
        let currentSha = null;
        let isSaving = false;

        const datiViaggi = {
            "Abruzzo": ["L'Aquila", "Pescara", "Chieti", "Teramo"],
            "Emilia-Romagna": ["Bologna", "Parma", "Modena", "Reggio Emilia", "Ravenna", "Rimini"],
            "Lazio": ["Roma", "Latina", "Viterbo", "Rieti"],
            "Lombardia": ["Milano", "Brescia", "Bergamo", "Como", "Varese"],
            "Toscana": ["Firenze", "Pisa", "Lucca", "Siena"],
            "Veneto": ["Venezia", "Verona", "Padova", "Vicenza", "Treviso"]
        };

        const mappaNomi = { p1: "Luca", p2: "Elena", p3: "Alessia", p4: "Filippo" };

        function richiediToken() {
            let t = prompt("Incolla il tuo GitHub Token (ghp_...):");
            if(t) { GITHUB_TOKEN = t.trim(); localStorage.setItem('gh_travel_token', GITHUB_TOKEN); caricaDati(); }
        }
        function resettaToken() { localStorage.removeItem('gh_travel_token'); richiediToken(); }
        function cambiaUtenteAttivo() {
            let r = prompt("Chi sei? Scrivi il numero:\n1: Luca, 2: Elena, 3: Alessia, 4: Filippo");
            if(r === "1") UTENTE_ATTIVO = "p1"; else if(r === "2") UTENTE_ATTIVO = "p2"; else if(r === "3") UTENTE_ATTIVO = "p3"; else if(r === "4") UTENTE_ATTIVO = "p4";
            localStorage.setItem('gh_travel_user', UTENTE_ATTIVO); renderizza();
        }
        function selezionaUtenteCard(id) { UTENTE_ATTIVO = id; localStorage.setItem('gh_travel_user', UTENTE_ATTIVO); renderizza(); }

        function renderizza() {
            const container = document.getElementById('regions-container');
            container.innerHTML = "";
            document.getElementById('current-user-label').innerText = mappaNomi[UTENTE_ATTIVO];
            document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active-user'));
            document.getElementById(`box-${UTENTE_ATTIVO}`).classList.add('active-user');

            for (const [regione, cittaList] of Object.entries(datiViaggi)) {
                let rId = regione.toLowerCase().replace(/[^a-z0-9]/g, "_");
                let cardHTML = `
                    <div class="regione-card">
                        <div class="regione-header"><div>📍 ${regione}</div></div>
                        <div class="table-header-row"><div>Città</div><div>Luca</div><div>Elena</div><div>Alessia</div><div>Filippo</div></div>
                        <div id="body_${rId}"></div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', cardHTML);
                let body = document.getElementById(`body_${rId}`);
                
                cittaList.forEach(citta => {
                    let safeId = citta.toLowerCase().replace(/[^a-z0-9]/g, "_");
                    let rowHTML = `
                        <div class="citta-row">
                            <div class="col-citta">${citta}</div>
                            <div><input type="checkbox" id="${safeId}_p1" ${UTENTE_ATTIVO!=='p1'?'disabled':''} onclick="salva('${safeId}', 'p1', this.checked)"></div>
                            <div><input type="checkbox" id="${safeId}_p2" ${UTENTE_ATTIVO!=='p2'?'disabled':''} onclick="salva('${safeId}', 'p2', this.checked)"></div>
                            <div><input type="checkbox" id="${safeId}_p3" ${UTENTE_ATTIVO!=='p3'?'disabled':''} onclick="salva('${safeId}', 'p3', this.checked)"></div>
                            <div><input type="checkbox" id="${safeId}_p4" ${UTENTE_ATTIVO!=='p4'?'disabled':''} onclick="salva('${safeId}', 'p4', this.checked)"></div>
                        </div>`;
                    body.insertAdjacentHTML('beforeend', rowHTML);
                });
            }
            aggiornaSpunteEConteggi();
        }

        function aggiornaSpunteEConteggi() {
            let punti = { p1: 0, p2: 0, p3: 0, p4: 0 };
            for (const [regione, cittaList] of Object.entries(datiViaggi)) {
                cittaList.forEach(citta => {
                    let safeId = citta.toLowerCase().replace(/[^a-z0-9]/g, "_");
                    ['p1', 'p2', 'p3', 'p4'].forEach(p => {
                        let el = document.getElementById(`${safeId}_${p}`);
                        if(el) {
                            if(statoGlobale[`${safeId}_${p}`] === true) { el.checked = true; punti[p]++; }
                            else { el.checked = false; }
                        }
                    });
                });
            }
            document.getElementById('score-p1').innerText = punti.p1;
            document.getElementById('score-p2').innerText = punti.p2;
            document.getElementById('score-p3').innerText = punti.p3;
            document.getElementById('score-p4').innerText = punti.p4;
        }

        async function caricaDati() {
            if(!GITHUB_TOKEN) { document.getElementById('status-indicator').innerText = "🔑 Inserisci Token"; return; }
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_CONFIG.owner}/${GH_CONFIG.repo}/contents/${GH_CONFIG.path}`, {
                    headers: { "Authorization": `Bearer ${GITHUB_TOKEN}`, "Accept": "application/vnd.github.v3+json" }
                });
                if(res.ok) {
                    let json = await res.json(); currentSha = json.sha;
                    statoGlobale = JSON.parse(atob(json.content));
                    renderizza();
                    document.getElementById('status-indicator').innerText = "🟢 Sincronizzato";
                } else if(res.status === 404) {
                    document.getElementById('status-indicator').innerText = "📂 Nuovo File";
                    inviaACloud();
                }
            } catch(e) { document.getElementById('status-indicator').innerText = "⚠️ Errore Connessione"; }
        }

        function salva(cittaId, persona, checked) {
            statoGlobale[`${cittaId}_${persona}`] = checked;
            aggiornaSpunteEConteggi();
            inviaACloud();
        }

        async function inviaACloud() {
            if(!GITHUB_TOKEN || isSaving) return;
            isSaving = true;
            try {
                let resGet = await fetch(`https://api.github.com/repos/${GH_CONFIG.owner}/${GH_CONFIG.repo}/contents/${GH_CONFIG.path}`, {
                    headers: { "Authorization": `Bearer ${GITHUB_TOKEN}`, "Accept": "application/vnd.github.v3+json" }
                });
                if(resGet.ok) { let j = await resGet.json(); currentSha = j.sha; }

                let b64 = btoa(unescape(encodeURIComponent(JSON.stringify(statoGlobale, null, 2))));
                let payload = { message: "Aggiornamento tabellone", content: b64, branch: GH_CONFIG.branch };
                if(currentSha) payload.sha = currentSha;

                let resPut = await fetch(`https://api.github.com/repos/${GH_CONFIG.owner}/${GH_CONFIG.repo}/contents/${GH_CONFIG.path}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GITHUB_TOKEN}` },
                    body: JSON.stringify(payload)
                });
                if(resPut.ok) { let jPut = await resPut.json(); currentSha = jPut.content.sha; document.getElementById('status-indicator').innerText = "🟢 Sincronizzato"; }
            } catch(e) {} finally { isSaving = false; }
        }

        renderizza();
        if(!GITHUB_TOKEN) { setTimeout(richiediToken, 500); } else { caricaDati(); }
    </script>
</body>
</html>
